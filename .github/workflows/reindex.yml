name: reindex
# logos-live#14 — auto-refresh channels.json so new inscriptions resolve hands-off.
# Runs on GitHub's infra against public Paradox (no self-hosted node, no creds).
on:
  schedule:
    - cron: '*/10 * * * *'      # every ~10 min (GitHub may delay under load)
  workflow_dispatch:             # manual "refresh now" (gh workflow run reindex.yml)
permissions:
  contents: write
concurrency:
  group: reindex
  cancel-in-progress: false
jobs:
  reindex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: index (incremental — walks only new blocks since last run)
        env:
          NODE: https://logos-testnet.paradox.computer
        run: python3 indexer.py 1200
      - name: publish only if the channel index changed (ignore tip churn)
        run: |
          git config user.name  "logos-indexer[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          NEW=$(python3 -c "import json;print(json.dumps(json.load(open('channels.json')).get('channels',{}),sort_keys=True))")
          OLD=$(git show HEAD:channels.json | python3 -c "import sys,json;print(json.dumps(json.load(sys.stdin).get('channels',{}),sort_keys=True))" 2>/dev/null || echo "")
          if [ "$NEW" = "$OLD" ]; then
            echo "channel index unchanged — no commit"
            git checkout -- channels.json || true
          else
            git add channels.json
            git commit -m "index: new/updated inscription(s)"
            git pull --rebase --autostash || true
            git push
          fi
